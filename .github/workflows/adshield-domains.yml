name: Ad Shield Domains

on:
  schedule:
    - cron: "30 0 * * 3" # Runs 00:30 UTC Only on Wednesday
  push:
    branches:
      - main
    paths:
      - ".github/workflows/adshield-domains.yml"
  pull_request:
    paths:
      - ".github/workflows/adshield-domains.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  Updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install FOP CLI
        run: ./scripts/install-fop.sh

      - name: Download Ad Shield List
        run: |
          # Preserve header (first 15 lines) and append new domains
          ./scripts/remove-lines.sh filters/adshield-domains.txt 15 > filters/adshield-domains.tmp
          curl -L https://raw.githubusercontent.com/hagezi/dns-blocklists/refs/heads/main/share/ad-shield.txt | sed 's/^/||/; s/$/^$third-party/' >> filters/adshield-domains.tmp
          mv filters/adshield-domains.tmp filters/adshield-domains.txt

      - name: Sort & Generate Checksum
        run: |
          # FOP handles sorting and checksum
          ./scripts/checksum-sort.sh filters/adshield-domains.txt

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(filters): update admiral domains filter list"
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: adshield-domains-update
          base: main
          delete-branch: true
          title: "chore(filters): update adshield domains filter list"
          body: |
            Update Ad Shield Domains Filter List:
            - Updated with *today's* date
            - Auto-generated by [create-pull-request][1]

            [1]: https://github.com/peter-evans/create-pull-request
          labels: automated pr
          assignees: LanikSJ
          reviewers: LanikSJ
          draft: false
