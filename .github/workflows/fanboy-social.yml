name: Fanboy Social

on:
  schedule:
    - cron: "0 2 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fanboy-social.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  Updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install FOP CLI
        run: |
          mkdir -p ~/.local/bin
          LATEST_TAG=$(curl -sL -o /dev/null -w "%{url_effective}" https://github.com/ryanbr/fop-rs/releases/latest | awk -F/ '{print $NF}')
          VERSION=${LATEST_TAG#v}
          curl -sSL --connect-timeout 20 --retry 5 --retry-delay 2 "https://github.com/ryanbr/fop-rs/releases/download/${LATEST_TAG}/fop-${VERSION}-linux-x86_64" -o ~/.local/bin/fop
          chmod +x ~/.local/bin/fop
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Download Fanboy Social
        run: |
          curl -L https://easylist.to/easylist/fanboy-social.txt | grep -Ev '##|#@' > filters/fanboy-social-no-cosmetic.txt
          ./scripts/checksum-sort.sh filters/fanboy-social-no-cosmetic.txt

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(filters): update fanboy social without cosmetic filters"
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: fanboy-social-update
          delete-branch: true
          title: "chore(filters): update fanboy social without cosmetic filters"
          body: |
            Update Fanboy Social Without Cosmetic Filters:
            - Updated with *today's* date
            - Auto-generated by [create-pull-request][1]

            [1]: https://github.com/peter-evans/create-pull-request
          labels: automated pr
          assignees: LanikSJ
          reviewers: LanikSJ
          draft: false

      - name: Enable PR Automerge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d # v3.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
